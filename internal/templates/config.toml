# Construct CLI Configuration File
# Path: ~/.config/construct-cli/config.toml
# Documentation: https://github.com/EstebanForge/construct-cli

# Runtime Preferences
[runtime]
# Options: "auto", "container", "podman", "docker"
# "auto" will detect in priority order: container > podman > docker
engine = "auto"

# Automatically check for updates once per day (true/false)
auto_update_check = true

# Update check interval in seconds (default: 86400 = 24 hours)
update_check_interval = 86400

# Update channel: "stable" (default) or "beta"
# "beta" lets selected machines receive pre-release updates only.
update_channel = "stable"

# Sandbox Settings
[sandbox]
# Mount the entire home directory? (Dangerous, default: false)
mount_home = false

# Forward host SSH agent into the container (default: true)
forward_ssh_agent = true

# Sync host git name/email into container (default: true)
propagate_git_identity = true

# Enforce strict non-root runtime behavior by forcing container user mapping (default: false)
# WARNING: On Docker this can break first-run package installs (Homebrew/npm permission issues)
# because root bootstrap permission-fixes are bypassed.
# Enable only for strict compliance environments where non-root is mandatory.
non_root_strict = false

# Allow manual customizations in docker-compose.override.yml (default: false)
# Advanced: when enabled, Construct will not auto-heal manual 'user:' override mappings.
# Use only if you intentionally maintain your own override behavior.
allow_custom_compose_override = false

# Run agent exec sessions as host UID:GID on Linux Docker (default: true)
# Purpose: preserve host file ownership for files written by agents.
# This applies to exec paths (daemon + attach), while keeping startup root-bootstrap intact.
# If host UID is not present in container /etc/passwd, Construct keeps host UID:GID mapping and forces HOME=/home/construct.
exec_as_host_user = true

# Explicit host env vars to pass through into Construct unchanged.
# Default passthroughs cover common CLI/tool auth use cases.
env_passthrough = ["GITHUB_TOKEN", "CONTEXT7_API_KEY"]

# Host env prefixes to auto-pass into Construct after stripping the prefix.
# Example: host CNSTR_CONTEXT7_API_KEY=... becomes CONTEXT7_API_KEY inside Construct.
# Explicit env_passthrough values win if both sources target the same inside key.
env_passthrough_prefixes = ["CNSTR_"]

# SELinux mount labels on Linux: "auto" | "enabled" | "disabled"
selinux_labels = "auto"

# Default shell inside the container
shell = "/bin/bash"

# Hostname for the host clipboard bridge
clipboard_host = "host.docker.internal"

# Agent Behavior
[agents]
# Enable yolo mode for all supported agents (default: false, overrides yolo_agents)
yolo_all = false

# Enable yolo mode for specific agents (slugs), e.g. ["claude", "gemini"]
# Supported: claude, gemini, codex, qwen, copilot, cline, kilocode, crush
yolo_agents = []

# Patch clipboard integrations for JS/NPM agents and install PTY clipboard wrappers
# for Copilot/Codex image paste support (default: true).
clipboard_image_patch = true

# Daemon Settings
[daemon]
# Auto-start the daemon on first agent run for faster subsequent startups (default: true)
auto_start = true

# Enable multi-root daemon mounts (advanced, default: false)
# Purpose: allow the daemon to serve runs from multiple host roots, not just the current repo.
# Benefits: faster agent startups across different projects without restarting the daemon.
multi_paths_enabled = false

# Host directories the daemon can serve (used only when multi_paths_enabled=true)
# Supports "~" home expansion, e.g. ["~/Dev/Projects", "/work/client-repos"]
mount_paths = []

# Network Isolation (Optional)
[network]
# Mode: "permissive" (default), "strict" (block all except allowed), "offline" (no network)
mode = "permissive"

# Domain allowlist (supports wildcards)
allowed_domains = [
    "*.anthropic.com",
    "*.openai.com",
    "*.googleapis.com",
    "api.z.ai"
]

# IP/CIDR allowlist
allowed_ips = [
    "1.1.1.1/32",     # Cloudflare DNS
    "8.8.8.8/32"      # Google DNS
]

# Domain blocklist (takes precedence)
blocked_domains = [
    "*.malicious-site.example",
    "*.phishing.attempt.com"
]

# IP blocklist
blocked_ips = [
    "192.168.100.100/32",
    "203.0.113.0/24"
]

# Maintenance Settings
[maintenance]
# Enable periodic cleanup of old log files (true/false)
cleanup_enabled = true

# Cleanup interval in seconds (default: 86400 = 24 hours)
cleanup_interval_seconds = 86400

# Delete logs older than this many days (default: 15)
log_retention_days = 15

# Secret Redaction Mode (Experimental, Opt-In)
[security]
# WARNING: This is an experimental feature. Requires CONSTRUCT_EXPERIMENT_HIDE_SECRETS=1 env var to function.
# When enabled, prevents LLM agents from seeing raw secrets in mounted project files and environment variables.
# Default: false (disabled)
hide_secrets = false

# Mask style for redacted secrets: "hash" (default) or "fixed"
# - "hash": Shows unique placeholder per secret (CONSTRUCT_REDACTED_<H8>) - better for debugging
# - "fixed": Shows static placeholder (CONSTRUCT_REDACTED) - maximum secrecy
hide_secrets_mask_style = "hash"

# Glob patterns for files that are always scanned for secrets, regardless of heuristics
# Example: ["**/secrets.yml", "**/.env.local"]
hide_secrets_deny_paths = []

# ⚠️  DANGER: Files to NEVER redact (breaks security model, use sparingly!)
# These files will be passed to agents in raw, unredacted form.
# Use ONLY for files that tools must read directly (e.g., ~/.aws/credentials for AWS CLI).
# WARNING: Any secrets in these files WILL be visible to agents.
# Example: ["~/.aws/credentials", "config/tool-specific-secrets.yaml"]
hide_secrets_allow_paths = []

# Environment variable names to pass through unmasked (advanced, use sparingly)
# These vars will be visible to agents in raw form. Example: ["PUBLIC_API_URL", "APP_ENV"]
hide_secrets_passthrough_vars = []

# Emit a session report after each agent run showing scan/redaction statistics
hide_secrets_report = true

# Hide .git directory in merged view (default: true)
# WARNING: Setting to false exposes git history, reflogs, and past commits which may contain secrets
hide_git_dir = true

# Host Service Bridge
[bridge]
# Enable access to services running on the host machine from within the sandbox (default: false)
# SECURITY: This feature is opt-in for security reasons. When enabled, containers can access
# services on your host machine (e.g., agentmemory server, databases, APIs).
enabled = false

# Automatically detect host gateway IP (default: true)
# When true, construct-cli will automatically detect the best method to reach host services
# based on your container runtime (Docker, Podman, macOS native). If auto-detection fails,
# see the on_failure setting below.
auto_detect = true

# Behavior when host gateway detection fails: "warn" (default), "fail", "silent"
# - "warn": Show warning but continue (plugin hooks may fail silently)
# - "fail": Stop container startup and require manual fix
# - "silent": Continue without warning (not recommended)
on_failure = "warn"

# Manual host IP override (advanced, use only if auto_detect fails)
# Example: "192.168.65.1" for Docker Desktop macOS, or "10.0.2.2" for some Linux setups
# Leave empty to use automatic detection.
manual_host_ip = ""

# Host services to bridge (format: "service_name:port")
# Each service will generate environment variables:
#   CONSTRUCT_<SERVICE>_HOST (e.g., CONSTRUCT_AGENTMEMORY_HOST)
#   CONSTRUCT_<SERVICE>_PORT (e.g., CONSTRUCT_AGENTMEMORY_PORT)
#   CONSTRUCT_<SERVICE>_URL  (e.g., CONSTRUCT_AGENTMEMORY_URL)
# Plus CONSTRUCT_HOST_IP for the detected host IP.
services = [
    # Example: AgentMemory persistent memory server
    # "agentmemory:3111",
    #
    # Example: PostgreSQL database on host
    # "postgres:5432",
    #
    # Example: Redis cache on host
    # "redis:6379",
    #
    # Example: Local development API
    # "api:8080",
]

